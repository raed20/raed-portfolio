<section class="projects-section">
  <div class="header-section">
    <h2 class="main-title">My Projects</h2>
    <p class="subtitle">A selection of things I've built — from AI agents to cloud infrastructure</p>
  </div>

  <div class="category-nav">
    <button
      *ngFor="let category of categories"
      (click)="setActiveCategory(category.key)"
      [class]="getCategoryButtonClasses(category.key)"
      class="category-btn"
    >
      <i [class]="category.iconClass"></i>
      <span>{{ category.label }}</span>
      <span class="count-badge">{{ getCategoryCount(category.key) }}</span>
    </button>
  </div>

  <div class="projects-grid">
    <div class="project-card" *ngFor="let project of getFilteredProjects()">
      <div class="card-accent" [ngClass]="getCategoryColorClass(project.category)"></div>

      <div class="card-body">
        <div class="card-icon" [ngClass]="getCategoryColorClass(project.category)">
          <i [class]="getCategoryIconClass(project.category)"></i>
        </div>

        <h3 class="card-title">{{ project.title }}</h3>
        <p class="card-description">{{ project.description }}</p>

        <div class="tech-tags">
          <span class="tech-tag" *ngFor="let tool of project.tools">{{ tool }}</span>
        </div>

        <a
          *ngIf="project.link"
          [href]="project.link"
          target="_blank"
          rel="noopener"
          class="project-link"
        >
          <i class="fab fa-github"></i>
          <span>View on GitHub</span>
        </a>
        <span *ngIf="!project.link" class="project-link disabled">
          <i class="fas fa-lock"></i>
          <span>Private Project</span>
        </span>
      </div>
    </div>
  </div>
</section>
